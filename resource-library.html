<style>
  :root {

    --border: #E5E0DA;

  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  header {
    background: var(--accent);
    color: white;
    padding: 2.5rem 2rem 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-family: 'Source Serif 4', serif;
    font-size: 1.75rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
  }

  header p {
    opacity: 0.85;
    font-size: 0.9rem;
  }

  .search-bar {
    margin-top: 1rem;
    position: relative;
  }

  .search-bar input {
    width: 100%;
    padding: 0.65rem 1rem 0.65rem 2.5rem;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: 'DM Sans', sans-serif;
    background: rgba(255,255,255,0.15);
    color: white;
    outline: none;
  }

  .search-bar input::placeholder { color: rgba(255,255,255,0.6); }
  .search-bar input:focus { background: rgba(255,255,255,0.25); }

  .search-bar svg {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.6;
  }

  .container { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

  .section {
    margin-bottom: 1.5rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .section-header {
    padding: 0.9rem 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
    transition: background 0.15s;
  }

  .section-header:hover { background: var(--accent-light); }

  .section-header h2 {
    font-family: 'Source Serif 4', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-header .chevron {
    transition: transform 0.25s;
    color: var(--accent);
    flex-shrink: 0;
  }

  .section.open .chevron { transform: rotate(180deg); }

  .section-body {
    display: none;
    border-top: 1px solid var(--border);
  }

  .section.open .section-body { display: block; }

  .subsection {
    border-bottom: 1px solid var(--border);
  }

  .subsection:last-child { border-bottom: none; }

  .subsection-header {
    padding: 0.7rem 1.1rem 0.7rem 1.8rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-weight: 500;
    font-size: 0.92rem;
    color: var(--text);
    transition: background 0.15s;
  }

  .subsection-header:hover { background: #FAFAF8; }

  .subsection-header .chevron-sm {
    transition: transform 0.25s;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .subsection.open .chevron-sm { transform: rotate(180deg); }

  .resource-list {
    display: none;
    padding: 0.25rem 1.1rem 0.75rem 2.4rem;
  }

  .subsection.open .resource-list { display: block; }

  .resource {
    padding: 0.5rem 0;
    border-bottom: 1px solid #F5F3F0;
  }

  .resource:last-child { border-bottom: none; }

  .resource a {
    color: var(--link);
    text-decoration: none;
    font-weight: 500;
    font-size: 0.9rem;
    display: inline-block;
    transition: color 0.15s;
  }

  .resource a:hover { color: var(--accent-hover); text-decoration: underline; }

  .resource .desc {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-top: 0.15rem;
    line-height: 1.45;
  }

  .resource .tag {
    display: inline-block;
    font-size: 0.72rem;
    background: var(--tag-bg);
    padding: 0.1rem 0.45rem;
    border-radius: 4px;
    color: var(--text-muted);
    margin-top: 0.2rem;
    font-weight: 500;
  }

  /* for sections with no subsections */
  .flat-resources {
    padding: 0.5rem 1.1rem 0.75rem;
  }

  .flat-resources .resource { padding-left: 0.6rem; }

  .count-badge {
    background: var(--accent-light);
    color: var(--accent);
    font-size: 0.72rem;
    font-weight: 600;
    padding: 0.15rem 0.5rem;
    border-radius: 10px;
    margin-left: 0.5rem;
  }

  .no-results {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
    font-size: 0.95rem;
  }

    header { padding: 1.5rem 1rem 1.25rem; }
    header h1 { font-size: 1.35rem; }
    .container { padding: 1rem 0.5rem 2rem; }
  }
</style>

function buildLibrary() {
  const container = document.getElementById('library');
  let totalResources = 0;

  DATA.forEach((section, si) => {
    const sectionEl = document.createElement('div');
    sectionEl.className = 'section';
    sectionEl.dataset.index = si;

    let subCount = 0;
    if (section.subs && section.subs.length) {
      section.subs.forEach(s => subCount += s.resources.length);
    }
    if (section.flatResources) subCount += section.flatResources.length;
    totalResources += subCount;

    let html = `<div class="section-header" onclick="toggleSection(${si})">
      <h2>${section.icon} ${section.title} <span class="count-badge">${subCount}</span></h2>
      <svg class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="section-body">`;

    if (section.subs && section.subs.length) {
      section.subs.forEach((sub, subi) => {
        html += `<div class="subsection" data-section="${si}" data-sub="${subi}">
          <div class="subsection-header" onclick="toggleSub(${si},${subi})">
            <span>${sub.title} <span class="count-badge">${sub.resources.length}</span></span>
            <svg class="chevron-sm" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="resource-list">`;
        sub.resources.forEach(r => {
          html += `<div class="resource">
            <a href="${r.url}" target="_blank" rel="noopener">${r.name}</a>
            <div class="desc">${r.desc}</div>
            <span class="tag">${r.tag}</span>
          </div>`;
        });
        html += `</div></div>`;
      });
    }

    if (section.flatResources) {
      html += `<div class="flat-resources">`;
      section.flatResources.forEach(r => {
        html += `<div class="resource">
          <a href="${r.url}" target="_blank" rel="noopener">${r.name}</a>
          <div class="desc">${r.desc}</div>
          <span class="tag">${r.tag}</span>
        </div>`;
      });
      html += `</div>`;
    }

    html += `</div>`;
    sectionEl.innerHTML = html;
    container.appendChild(sectionEl);
  });

  document.querySelector('header p').textContent = `Expanded Core Curriculum & Visual Impairment — ${totalResources} resources`;
}

function toggleSection(i) {
  const el = document.querySelectorAll('.section')[i];
  el.classList.toggle('open');
}

function toggleSub(si, subi) {
  const el = document.querySelector(`.subsection[data-section="${si}"][data-sub="${subi}"]`);
  el.classList.toggle('open');
  event.stopPropagation();
}

function filterResources() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const sections = document.querySelectorAll('.section');
  let anyVisible = false;

  sections.forEach(section => {
    const allResources = section.querySelectorAll('.resource');
    const subsections = section.querySelectorAll('.subsection');
    let sectionHasMatch = false;

    if (!query) {
      section.style.display = '';
      section.classList.remove('open');
      subsections.forEach(s => { s.style.display = ''; s.classList.remove('open'); });
      allResources.forEach(r => r.style.display = '');
      anyVisible = true;
      return;
    }

    // check section title
    const sectionTitle = section.querySelector('h2').textContent.toLowerCase();
    if (sectionTitle.includes(query)) sectionHasMatch = true;

    allResources.forEach(r => {
      const text = r.textContent.toLowerCase();
      if (text.includes(query)) {
        r.style.display = '';
        sectionHasMatch = true;
      } else {
        r.style.display = 'none';
      }
    });

    subsections.forEach(sub => {
      const subTitle = sub.querySelector('.subsection-header span').textContent.toLowerCase();
      const visibleResources = sub.querySelectorAll('.resource:not([style*="display: none"])');
      if (subTitle.includes(query) || visibleResources.length > 0) {
        sub.style.display = '';
        sub.classList.add('open');
        if (subTitle.includes(query)) {
          sub.querySelectorAll('.resource').forEach(r => r.style.display = '');
        }
      } else {
        sub.style.display = 'none';
      }
    });

    if (sectionHasMatch) {
      section.style.display = '';
      section.classList.add('open');
      anyVisible = true;
    } else {
      section.style.display = 'none';
    }
  });

  document.getElementById('noResults').style.display = anyVisible ? 'none' : 'block';
}

buildLibrary();
